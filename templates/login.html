<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        form {
            background: #1c1c1c;
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            width: 220px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #00adb5;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #019ca3;
        }

        hr {
            margin: 20px 0;
            border: 1px solid #444;
        }
    </style>

</head>

<body>

<h2>Login</h2>

<form action="/login" method="post">

<h3>Student Login</h3>

College ID:
<input type="text" name="id" pattern="[A-Za-z0-9]+" title="Only letters and numbers allowed" required>
<br><br>

Roll No:
<input type="number" name="roll" required>
<br><br>

<hr>

<h3>Admin Login</h3>

Username:
<input type="text" name="admin_user">
<br><br>

Password:
<input type="password" name="admin_pass">
<br><br>

<button type="submit">Login</button>

</form>

</body>
</html>
